<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>撸还是不撸</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="brand">撸还是<span>不撸</span> 🎰</div>
      <div class="me">
        <img class="avatar" id="meAvatar" src="" alt="" />
        <span class="name" id="meName"></span>
        <button class="linkbtn" id="settingsBtn">设置</button>
        <button class="linkbtn" id="logoutBtn">退出</button>
      </div>
    </div>

    <!-- 轮盘 -->
    <div class="card roulette-card">
      <h2 class="section-title" style="justify-content:center;">今天，撸还是不撸？</h2>
      <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
          <span class="wheel-label lu">撸</span>
          <span class="wheel-label bulu">不撸</span>
        </div>
      </div>
      <div class="result-big" id="resultBig"></div>
      <button class="btn" id="spinBtn" style="max-width:240px;margin-left:auto;margin-right:auto;">转动命运轮盘</button>
      <p class="hint" id="spinHint">每天只能决定一次，定了就锁住</p>

      <!-- 手动选择：不想交给命运就自己定 -->
      <div class="manual" id="manualBox">
        <span class="manual-or">或者自己定</span>
        <div class="row" style="max-width:300px;margin:8px auto 0;">
          <button class="btn lu" id="chooseLu">我要撸</button>
          <button class="btn bulu" id="chooseBulu">我不撸</button>
        </div>
      </div>

      <!-- 打卡：决定之后写两句 / 配张图（都可选，可纯文字打卡） -->
      <div class="checkin" id="checkinBox" style="display:none;">
        <div class="checkin-title">📝 今日打卡</div>
        <textarea id="noteInput" maxlength="1000" rows="3" placeholder="说点什么…（可纯文字打卡，也可以不写）"></textarea>
        <img class="checkin-photo" id="checkinPhoto" alt="" style="display:none;" />
        <input type="file" id="photoFile" accept="image/*" style="display:none;" />
        <div class="row" style="margin-top:10px;">
          <button class="btn secondary" id="pickPhoto">＋ 配图</button>
          <button class="btn" id="publishCheckin">发布打卡</button>
        </div>
        <div class="hint">配图 ≤ 4MB，png/jpg/webp/gif，可重新发布替换</div>
        <div class="msg" id="checkinMsg"></div>
      </div>
    </div>

    <!-- 信息流 -->
    <div class="card">
      <h2 class="section-title">🧵 大家的动态</h2>
      <div class="feed" id="feed"></div>
      <button class="btn secondary" id="loadMore" style="display:none;">加载更多</button>
      <div class="hint" id="feedEnd" style="display:none;text-align:center;">—— 到底啦 ——</div>
    </div>

    <!-- 统计 -->
    <div class="card">
      <h2 class="section-title">📊 大家的战况</h2>
      <div class="tabs" id="rangeTabs">
        <span class="tab active" data-days="14">近 14 天</span>
        <span class="tab" data-days="30">近 30 天</span>
        <span class="tab" data-days="7">近 7 天</span>
      </div>
      <div class="legend">
        <span><i class="dot lu"></i>撸</span>
        <span><i class="dot bulu"></i>不撸</span>
        <span><i class="dot"></i>未决定</span>
      </div>

      <div class="grid-wrap">
        <table class="grid" id="gridTable"></table>
      </div>

      <h2 class="section-title" style="margin-top:28px;">🏆 撸率排行</h2>
      <canvas id="ratioChart" height="120"></canvas>
    </div>
  </div>

  <!-- 设置弹层 -->
  <div class="modal-bg" id="modalBg">
    <div class="card modal">
      <h3>个人设置</h3>
      <div class="avatar-edit">
        <img id="editAvatar" src="" alt="" />
        <div>
          <input type="file" id="avatarFile" accept="image/*" style="display:none" />
          <button class="btn secondary" id="pickAvatar" style="margin-top:0;width:auto;padding:8px 16px;">更换头像</button>
          <div class="hint" style="margin-top:6px;">≤ 2MB，png/jpg/webp/gif</div>
        </div>
      </div>
      <label for="editNickname">昵称</label>
      <input type="text" id="editNickname" maxlength="20" />
      <div class="msg" id="settingsMsg"></div>
      <div class="row" style="margin-top:20px;">
        <button class="btn secondary" id="closeModal">关闭</button>
        <button class="btn" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <!-- 看大图 -->
  <div class="modal-bg" id="photoModal">
    <img id="photoBig" class="lightbox-img" src="" alt="打卡照片" />
  </div>

  <script src="/js/bg.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
